<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הצטרפות לקבוצת ווטסאפ</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0f1117; --surface: #1a1d27; --surface2: #222536; --border: #2e3148; --accent: #4f8ef7; --green: #4fd18a; --yellow: #f7c94f; --purple: #b07ef7; --orange: #f7774f; --text: #e8eaf0; --muted: #8890a8; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; direction: rtl; padding: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 32px; max-width: 420px; width: 100%; text-align: center; }
  .logo { font-size: 44px; margin-bottom: 12px; }
  .title { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
  .cat-btn { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 10px; text-decoration: none; color: var(--text); cursor: pointer; transition: border-color 0.15s; }
  .cat-btn:hover { border-color: var(--accent); }
  .cat-name { font-weight: 700; font-size: 16px; }
  .btn-wa { display: inline-flex; align-items: center; gap: 10px; background: #25D366; color: white; font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 700; padding: 14px 28px; border-radius: 12px; text-decoration: none; transition: opacity 0.15s; margin-top: 8px; }
  .btn-wa:hover { opacity: 0.85; }
  .btn-back { background: none; border: none; color: var(--muted); font-family: 'Heebo', sans-serif; font-size: 13px; cursor: pointer; margin-top: 16px; padding: 8px; display: block; margin-left: auto; margin-right: auto; }
  .btn-back:hover { color: var(--text); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 20px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-warn { color: var(--yellow); font-size: 12px; margin-top: 3px; }
  .err { color: var(--orange); font-size: 14px; margin-top: 12px; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner"></div>
  <div style="color:var(--muted);font-size:14px">טוען...</div>
</div>
<script>
var SHEET_ID = '1A6EPgnd0cax-KDjGtV1D1mXnhNE1mie1FCJLljybEgI';
var SHEET_NAME = 'קישורים לקבוצות ווטסאפ';
var SETTINGS_SHEET_NAME = 'פורמט הודעה';
var groupsData = [];
var audienceColors = {}; // נטען מהשיט

function loadSettings(callback) {
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(SETTINGS_SHEET_NAME) + '&t=' + Date.now();
  fetch(url)
    .then(function(r) { return r.text(); })
    .then(function(text) {
      var json = text.replace(/^\/\*[^*]*\*\/\s*/, '').replace(/^[\s\S]*?\(/, '').replace(/\);?\s*$/, '');
      var data = JSON.parse(json);
      var h = [];
      if (data.table.cols) data.table.cols.forEach(function(c) { h.push(c && c.label ? c.label.trim() : ''); });
      var ki = h.indexOf('מפתח'), vi = h.indexOf('ערך');
      if (ki !== -1 && vi !== -1) {
        data.table.rows.forEach(function(row) {
          if (!row.c) return;
          var key = (row.c[ki] && row.c[ki].v) ? String(row.c[ki].v).trim() : '';
          var val = (row.c[vi] && row.c[vi].v) ? String(row.c[vi].v).trim() : '';
          if (key.indexOf('צבע_') === 0 && val) {
            audienceColors[key.replace('צבע_', '')] = val;
          }
        });
      }
      callback();
    }).catch(function() { callback(); });
}

function getAudienceColor(audience) {
  if (audienceColors[audience]) return audienceColors[audience];
  if (audience.indexOf('ילדים') !== -1 && audience.indexOf('ערבית') !== -1) return '#4fd4d4';
  if (audience.indexOf('נוער') !== -1 && audience.indexOf('ערבית') !== -1) return '#f7774f';
  if (audience.indexOf('ילדים') !== -1) return '#4fd18a';
  if (audience.indexOf('נוער') !== -1) return '#4f8ef7';
  if (audience.indexOf('אזרחים') !== -1) return '#f7c94f';
  if (audience.indexOf('אקו') !== -1) return '#b07ef7';
  return '#4f8ef7';
}

function getBadgeHtml(audience) {
  var color = getAudienceColor(audience);
  return '<span style="display:inline-block;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700;background:' + color + '22;color:' + color + '">' + audience + '</span>';
}

function init() {
  loadSettings(function() {
    var params = new URLSearchParams(window.location.search);
    var audience = params.get('q') || '';
    loadGroups(function(groups) {
      groupsData = groups;
      if (audience) {
        showGroup(audience);
      } else {
        showCategories();
      }
    });
  });
}

function loadGroups(callback) {
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(SHEET_NAME) + '&t=' + Date.now();
  fetch(url)
    .then(function(r) { return r.text(); })
    .then(function(text) {
      var json = text.replace(/^\/\*[^*]*\*\/\s*/, '').replace(/^[\s\S]*?\(/, '').replace(/\);?\s*$/, '');
      var data = JSON.parse(json);
      var h = [];
      if (data.table.cols) data.table.cols.forEach(function(c) { h.push(c && c.label ? c.label.trim() : ''); });
      var ai = h.indexOf('קהל יעד'), ni = h.indexOf('שם הקבוצה'), li = h.indexOf('קישור'), si = h.indexOf('סטטוס');
      var groups = [];
      data.table.rows.forEach(function(row) {
        if (!row.c) return;
        var g = function(i) { return (i>=0 && row.c[i] && row.c[i].v!==null) ? String(row.c[i].v).trim() : ''; };
        var aud = g(ai), link = g(li);
        if (!aud || !link) return;
        groups.push({ audience: aud, name: g(ni), link: link, status: g(si) || 'פתוחה' });
      });
      callback(groups);
    })
    .catch(function() {
      document.getElementById('card').innerHTML = '<div class="logo">⚠️</div><div class="title">שגיאה בטעינה</div><div class="err">לא ניתן לטעון נתונים. נסה שוב.</div>';
    });
}

function showCategories() {
  var cats = {};
  groupsData.forEach(function(g) {
    if (g.status !== 'מלאה') {
      if (!cats[g.audience]) cats[g.audience] = { open: 0, almost: 0 };
      if (g.status === 'פתוחה') cats[g.audience].open++;
      else cats[g.audience].almost++;
    }
  });
  var keys = Object.keys(cats);
  if (keys.length === 0) {
    document.getElementById('card').innerHTML = '<div class="logo">⚠️</div><div class="title">אין קבוצות פתוחות כרגע</div><div class="subtitle">פנה לצוות לפתיחת קבוצה חדשה</div>';
    return;
  }
  var btns = keys.map(function(aud) {
    var info = cats[aud];
    var isWarn = info.open === 0;
    var color = getAudienceColor(aud);
    return '<a class="cat-btn" href="?q=' + encodeURIComponent(aud) + '" style="border-right:3px solid ' + color + '">' +
      '<div style="text-align:right">' +
        '<div class="cat-name">' + aud + '</div>' +
        (isWarn ? '<div class="status-warn">⚠️ כמעט מלאה</div>' : '') +
      '</div>' +
      getBadgeHtml(aud) +
    '</a>';
  }).join('');
  document.getElementById('card').innerHTML =
    '<div class="logo">💬</div>' +
    '<div class="title">לאיזו קבוצה להצטרף?</div>' +
    '<div class="subtitle">בחר/י את הקטגוריה המתאימה</div>' +
    btns;
}

function showGroup(audience) {
  var relevant = groupsData.filter(function(g) { return g.audience === audience && g.status !== 'מלאה'; });
  var open = relevant.filter(function(g) { return g.status === 'פתוחה'; });
  var best = open.length > 0 ? open[0] : (relevant.length > 0 ? relevant[0] : null);
  if (!best) {
    document.getElementById('card').innerHTML =
      '<div class="logo">⚠️</div><div class="title">אין קבוצה פתוחה</div>' +
      '<div class="subtitle">הקבוצות עבור "' + audience + '" מלאות כרגע</div>' +
      '<button class="btn-back" onclick="window.location.href=window.location.pathname">← חזרה לבחירת קטגוריה</button>';
    return;
  }
  var warn = best.status === 'כמעט מלאה' ? '<div style="color:var(--yellow);font-size:13px;margin-bottom:16px">⚠️ הקבוצה כמעט מלאה</div>' : '';
  document.getElementById('card').innerHTML =
    '<div class="logo">💬</div>' +
    getBadgeHtml(audience) +
    '<div class="title" style="margin-bottom:8px;margin-top:12px">' + (best.name || audience) + '</div>' +
    warn +
    '<div class="subtitle">מיד תועבר/י אוטומטית.<br>אם לא קרה כלום — לחץ/י על הכפתור.</div>' +
    '<a class="btn-wa" href="' + best.link + '">' +
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>' +
      'הצטרפות לקבוצה' +
    '</a>' +
    '<button class="btn-back" onclick="window.location.href=window.location.pathname">← חזרה לבחירת קטגוריה</button>';
  setTimeout(function() { window.location.href = best.link; }, 1800);
}

init();
</script>
</body>
</html>
